<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bowl" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#6d4c1e"/>
      <stop offset="40%" stop-color="#a87840"/>
      <stop offset="70%" stop-color="#b8884a"/>
      <stop offset="100%" stop-color="#7d5c28"/>
    </linearGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a7234"/>
      <stop offset="100%" stop-color="#6d4c1e"/>
    </linearGradient>
    <radialGradient id="ember" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="76" fill="#0d1117"/>

  <!-- Pipe stem -->
  <path d="M 275,320 C 245,338 195,358 145,368 L 82,378"
        stroke="url(#stem)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <path d="M 272,314 C 244,331 196,350 146,360 L 86,369"
        stroke="#b8944a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.25"/>

  <!-- Mouthpiece: a subtle | nod to Unix pipe -->
  <rect x="68" y="362" width="8" height="32" rx="3" fill="#9a7234" opacity="0.9"/>
  <ellipse cx="82" cy="378" rx="14" ry="10" fill="#8a6530" stroke="#6d4c1e" stroke-width="2"/>

  <!-- Bowl body -->
  <path d="M 265,198 L 254,312 C 252,328 268,334 290,334 L 332,334
           C 354,334 370,328 368,312 L 357,198 Z"
        fill="url(#bowl)" stroke="#8a6530" stroke-width="2"/>

  <!-- Bowl opening - ember glow -->
  <ellipse cx="311" cy="200" rx="52" ry="22" fill="url(#ember)"/>

  <!-- Bowl opening (dark interior) -->
  <ellipse cx="311" cy="200" rx="44" ry="14" fill="#1a0800"/>

  <!-- Bowl rim -->
  <ellipse cx="311" cy="200" rx="48" ry="16" fill="none" stroke="#c4a050" stroke-width="4"/>

  <!-- # etched on bowl -->
  <text x="311" y="290" text-anchor="middle" dominant-baseline="central"
        font-family="'Courier New',monospace" font-weight="900" font-size="56"
        fill="#cc3030" opacity="0.80">#</text>

  <!-- Hex-digit smoke -->
  <g font-family="'Courier New',monospace" font-weight="bold" fill="#00ff41" filter="url(#glow)">
    <text x="298" y="172" font-size="26" opacity="0.95">a</text>
    <text x="335" y="156" font-size="20" opacity="0.80">3</text>
    <text x="272" y="143" font-size="23" opacity="0.68">f</text>
    <text x="348" y="124" font-size="17" opacity="0.55">0</text>
    <text x="300" y="108" font-size="20" opacity="0.44">e</text>
    <text x="332" y="88" font-size="16" opacity="0.33">7</text>
    <text x="280" y="72" font-size="17" opacity="0.22">b</text>
    <text x="320" y="55" font-size="13" opacity="0.13">d</text>
    <text x="298" y="40" font-size="10" opacity="0.07">9</text>
  </g>
</svg>
